name: Release

on:
  push:
    tags: ["v*"]

jobs:
  version-check:
    name: Version consistency
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches pyproject.toml
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "
          import re
          text = open('pyproject.toml').read()
          print(re.search(r'^version\s*=\s*\"(.+?)\"', text, re.MULTILINE).group(1))
          ")
          echo "Tag version:        $TAG_VERSION"
          echo "pyproject.toml:     $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi

      - name: Verify CHANGELOG has entry for this version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if ! grep -q "\[${TAG_VERSION}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for version $TAG_VERSION"
            exit 1
          fi

  build:
    needs: version-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
