name: Release Readiness

# Runs scripts/predeploy.sh on PRs + pushes to main. This is the same
# gate the release-orchestrator enforces at release time — running it
# in CI catches blockers (empty CHANGELOG, tools/ format drift, failing
# security scan) pre-merge instead of mid-release.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  predeploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # predeploy.sh checks git diff HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dev deps (ruff, pytest)
        run: pip install -e ".[dev]"

      - name: Run predeploy.sh
        run: bash scripts/predeploy.sh
